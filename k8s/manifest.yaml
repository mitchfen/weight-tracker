apiVersion: v1
kind: Namespace
metadata:
  name: weighttracker
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: weighttracker-db
  namespace: weighttracker
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weighttracker
  namespace: weighttracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weighttracker
  template:
    metadata:
      labels:
        app: weighttracker
    spec:
      containers:
      - name: weighttracker
        image: ghcr.io/mitchfen/weight-tracker:latest
        ports:
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: db
          mountPath: /app
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: db
        persistentVolumeClaim:
          claimName: weighttracker-db
---
apiVersion: v1
kind: Service
metadata:
  name: weighttracker
  namespace: weighttracker
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: weighttracker
