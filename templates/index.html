<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Tracker</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://unpkg.com/chart.js"></script>
    <script src="https://unpkg.com/htmx.org"></script>
</head>
<body>
    <div class="container">
        <h1>Weight Tracker</h1>

        <div class="form-section">
            <div id="message-container"></div>
            <form hx-post="/api/weight" hx-swap="none">
                <div class="form-group">
                    <div style="flex: 1;">
                        <label for="weight">Today's Weight (lbs)</label>
                        <input type="number" id="weight" name="weight" step="0.1" min="0" placeholder="Enter weight..." required>
                    </div>
                    <button type="submit" hx-indicator="#loading">Record</button>
                </div>
            </form>
        </div>

        <div class="chart-section">
            <canvas id="weightChart"></canvas>
        </div>
    </div>

    <script>
        let chart = null;

        function calculateExponentialMovingAverage(data, period = 7) {
            if (data.length === 0) return [];
            
            const multiplier = 2 / (period + 1);
            const ema = [data[0]];
            
            for (let i = 1; i < data.length; i++) {
                ema.push(data[i] * multiplier + ema[i - 1] * (1 - multiplier));
            }
            
            return ema;
        }

        async function loadChart() {
            try {
                const response = await fetch('/api/weights');
                const weights = await response.json();

                if (!weights || weights.length === 0) {
                    document.querySelector('.chart-section').innerHTML = '<div class="loading">No weight data yet. Record your first weight!</div>';
                    return;
                }

                const labels = weights.map(w => new Date(w.recorded_at).toLocaleDateString());
                const data = weights.map(w => w.weight);
                const emaData = calculateExponentialMovingAverage(data);

                const ctx = document.getElementById('weightChart').getContext('2d');
                
                if (chart) {
                    chart.destroy();
                }

                chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Weight (lbs)',
                            data: data,
                            borderColor: '#00bfff',
                            backgroundColor: 'rgba(0, 191, 255, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.1,
                            pointRadius: 5,
                            pointBackgroundColor: '#00bfff',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointHoverRadius: 7
                        }, {
                            label: 'Trend (7-day EMA)',
                            data: emaData,
                            borderColor: '#0088aa',
                            backgroundColor: 'transparent',
                            borderWidth: 3,
                            borderDash: [5, 5],
                            fill: false,
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top'
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: false,
                                ticks: {
                                    callback: function(value) {
                                        return value.toFixed(1) + ' lbs';
                                    }
                                }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Failed to load chart:', error);
            }
        }

        // Load chart on page load
        document.addEventListener('DOMContentLoaded', loadChart);

        // Reload chart on form submission
        document.querySelector('form').addEventListener('htmx:afterRequest', function(event) {
            const messageContainer = document.getElementById('message-container');
            
            if (event.detail.xhr.status === 200) {
                messageContainer.innerHTML = '<div class="message success">✓ Weight recorded successfully!</div>';
                document.getElementById('weight').value = '';
                setTimeout(() => {
                    messageContainer.innerHTML = '';
                    loadChart();
                }, 1500);
            } else {
                messageContainer.innerHTML = '<div class="message error">✗ Failed to record weight</div>';
                setTimeout(() => {
                    messageContainer.innerHTML = '';
                }, 3000);
            }
        });
    </script>
</body>
</html>
