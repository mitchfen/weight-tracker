<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Tracker</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://unpkg.com/chart.js"></script>
    <script src="https://unpkg.com/htmx.org"></script>
</head>
<body>
    <div class="container">
        <h1>Weight Tracker</h1>

        <div class="form-section">
            <div id="message-container"></div>
            <form hx-post="/api/weight" hx-swap="none">
                <div class="form-group">
                    <div style="flex: 1;">
                        <label for="weight">Today's Weight (lbs)</label>
                        <input type="number" id="weight" name="weight" step="0.1" min="0" placeholder="Enter today's weight..." required>
                    </div>
                    <button type="submit" hx-indicator="#loading">Record</button>
                </div>
            </form>
        </div>

        <div class="chart-section">
            <button id="history-toggle" class="btn-secondary history-toggle" type="button" onclick="toggleMobileHistory()" style="display:none;"></button>
            <div id="chart-empty-state" class="loading" style="display:none;">No weight data yet. Record your first weight!</div>
            <canvas id="weightChart"></canvas>
        </div>

        <div class="csv-actions">
            <a href="/api/weights/export" class="btn-secondary">Export CSV</a>
            <label for="csv-file" class="btn-secondary">Import CSV</label>
            <input type="file" id="csv-file" name="file" accept=".csv" style="display:none;" onchange="importCSV(this)">
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
