<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Tracker</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="manifest" href="/static/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://unpkg.com/chart.js"></script>
    <script src="https://unpkg.com/htmx.org"></script>
</head>
<body class="bg-slate-100 min-h-screen p-5 flex justify-center items-start">
    <div class="bg-white rounded-xl shadow-2xl max-w-3xl w-full p-5 sm:p-10">
        <h1 class="text-slate-800 text-3xl sm:text-4xl font-bold text-center mb-8">Weight Tracker</h1>

        <div class="bg-slate-50 p-5 sm:p-6 rounded-lg mb-8">
            <div id="message-container"></div>
            <form hx-post="/api/weight" hx-swap="none">
                <div class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-end">
                    <div class="flex-1">
                        <label for="weight" class="block text-slate-600 font-semibold text-sm mb-2">Today's Weight (lbs)</label>
                        <input type="number" id="weight" name="weight" step="0.1" min="0" placeholder="Enter today's weight..." required
                            class="w-full px-3 py-3 border-2 border-slate-300 rounded-md text-base focus:outline-none focus:border-slate-500 transition-colors">
                    </div>
                    <button type="submit" hx-indicator="#loading"
                        class="w-full sm:w-auto px-6 py-3 bg-slate-700 text-white rounded-md font-semibold hover:bg-slate-800 transition-colors text-base whitespace-nowrap disabled:bg-slate-300 disabled:cursor-not-allowed cursor-pointer">
                        Record
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-slate-50 p-5 sm:p-6 rounded-lg min-h-[280px] sm:min-h-[300px] flex flex-col justify-center">
            <button id="history-toggle" class="btn-secondary self-end sm:self-end mb-3" type="button" onclick="toggleHistory()" style="display:none;"></button>
            <div id="chart-empty-state" class="loading" style="display:none;">No weight data yet. Record your first weight!</div>
            <canvas id="weightChart"></canvas>
        </div>

        <div class="flex flex-wrap gap-2 mt-4">
            <a href="/api/weights/export" class="btn-secondary">Export CSV</a>
            <label for="csv-file" class="btn-secondary">Import CSV</label>
            <input type="file" id="csv-file" name="file" accept=".csv" style="display:none;" onchange="importCSV(this)">
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
